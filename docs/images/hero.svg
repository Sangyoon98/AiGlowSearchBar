<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AiGlow — rotating AI-style gradient glow for Jetpack Compose">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#161D33"/>
      <stop offset="60%" stop-color="#0D1220"/>
      <stop offset="100%" stop-color="#0A0E18"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="35%" stop-color="#9B72CB"/>
      <stop offset="70%" stop-color="#D96570"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7AA8FF"/>
      <stop offset="50%" stop-color="#B99AE8"/>
      <stop offset="100%" stop-color="#F0879A"/>
    </linearGradient>
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="softHalo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>

  <!-- wordmark -->
  <text x="600" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="1" fill="url(#title)">AiGlow</text>
  <text x="600" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" fill="#8B93A7">Rotating AI-style gradient glow for Jetpack Compose</text>

  <!-- glow search bar: wide soft halo, tight halo, container, crisp ring -->
  <rect x="255" y="222" width="690" height="106" rx="53" fill="none" stroke="url(#glow)" stroke-width="16" filter="url(#softHalo)" opacity="0.55"/>
  <rect x="255" y="222" width="690" height="106" rx="53" fill="none" stroke="url(#glow)" stroke-width="9" filter="url(#halo)" opacity="0.9"/>
  <rect x="255" y="222" width="690" height="106" rx="53" fill="#10151F"/>
  <rect x="255" y="222" width="690" height="106" rx="53" fill="none" stroke="url(#glow)" stroke-width="3.5"/>

  <!-- magnifier -->
  <g stroke="#8B93A7" stroke-width="4.5" fill="none" stroke-linecap="round">
    <circle cx="322" cy="271" r="14"/>
    <line x1="333" y1="282" x2="345" y2="294"/>
  </g>

  <!-- placeholder text + caret -->
  <text x="372" y="284" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="25" fill="#5E687D">Search anything…</text>
  <rect x="580" y="255" width="2.5" height="40" rx="1.25" fill="#4285F4" opacity="0.9"/>

  <!-- footer chips -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#6E7890">
    <text x="600" y="386" text-anchor="middle">SearchBar · FloatingActionButton · Box · Modifier.aiGlow  —  minSdk 26 · Material 3</text>
  </g>
</svg>
